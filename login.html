<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Techify.Max — Login Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at 20% 30%, #6c2bff15, transparent 40%),
                  radial-gradient(circle at 80% 70%, #8fefef15, transparent 40%),
                  #030305;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #fff;
    }

    .login-container {
      background: rgba(10,10,15,0.9);
      border: 1px solid rgba(144,97,238,0.3);
      border-radius: 16px;
      padding: 3rem;
      max-width: 400px;
      width: 90%;
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 60px rgba(144,97,238,0.2);
    }

    .login-logo {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #9061EE, #00D4FF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center;
      margin-bottom: 0.5rem;
    }

    .login-subtitle {
      text-align: center;
      color: #aaa;
      margin-bottom: 2rem;
      font-size: 0.9rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
      font-size: 0.9rem;
    }

    .form-group input {
      width: 100%;
      padding: 0.8rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(144,97,238,0.3);
      border-radius: 8px;
      color: white;
      font-family: inherit;
      transition: all 0.3s;
    }

    .form-group input:focus {
      outline: none;
      background: rgba(255,255,255,0.08);
      border-color: #9061EE;
      box-shadow: 0 0 20px rgba(144,97,238,0.2);
    }

    .login-btn {
      width: 100%;
      padding: 0.9rem;
      background: linear-gradient(135deg, #9061EE, #6c2bff);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 1rem;
      transition: all 0.3s;
      margin-top: 1rem;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(144,97,238,0.4);
    }

    .error-message {
      background: rgba(255,0,0,0.2);
      border: 1px solid rgba(255,0,0,0.4);
      color: #ff4444;
      padding: 0.8rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      display: none;
      text-align: center;
      font-size: 0.9rem;
    }

    .success-message {
      background: rgba(0,212,255,0.2);
      border: 1px solid rgba(0,212,255,0.4);
      color: #00D4FF;
      padding: 0.8rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      display: none;
      text-align: center;
      font-size: 0.9rem;
    }

    .back-link {
      text-align: center;
      margin-top: 1.5rem;
    }

    .back-link a {
      color: #9061EE;
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.3s;
    }

    .back-link a:hover {
      color: #00D4FF;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-logo">Techify.Max</div>
    <div class="login-subtitle">Painel de Administração</div>

    <div id="errorMessage" class="error-message"></div>
    <div id="successMessage" class="success-message"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="username">Usuário</label>
        <input type="text" id="username" placeholder="admin" required>
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>

      <button type="submit" class="login-btn">
        <i class="fas fa-sign-in-alt"></i> Entrar no Painel
      </button>
    </form>

    <div class="back-link">
      <a href="/index.html"><i class="fas fa-arrow-left"></i> Voltar para o site</a>
    </div>
  </div>

  <script>
    // Credenciais padrão
    const DEFAULT_USER = 'admin';
    const DEFAULT_PASS = btoa('techify2026'); // Senha: techify2026

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMessage');
      const successMsg = document.getElementById('successMessage');

      // Verificar credenciais
      let storedPass = localStorage.getItem('techify_password') || DEFAULT_PASS;
      
      if (username === DEFAULT_USER && btoa(password) === storedPass) {
        successMsg.textContent = '✓ Login realizado com sucesso! Redirecionando...';
        successMsg.style.display = 'block';
        errorMsg.style.display = 'none';
        
        sessionStorage.setItem('adminLogged', 'true');
        
        setTimeout(() => {
          window.location.href = '/admin.html';
        }, 1500);
      } else {
        errorMsg.textContent = '✗ Usuário ou senha incorretos!';
        errorMsg.style.display = 'block';
        successMsg.style.display = 'none';
        document.getElementById('password').value = '';
      }
    });

    // Se já está logado, redirecionar
    if (sessionStorage.getItem('adminLogged')) {
      window.location.href = '/admin.html';
    }
  </script>
</body>
</html>
